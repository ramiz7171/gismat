name: gismat
description: "GISMAT — modern, minimalist, location-aware dating app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Backend
  supabase_flutter: ^2.9.0

  # UI / motion
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  flutter_rating_bar: ^4.0.1

  # Device & media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  geolocator: ^13.0.2
  record: ^5.2.1
  just_audio: ^0.9.46
  permission_handler: ^11.4.0
  haptic_feedback: ^0.5.1

  # Swipe deck
  swipable_stack: ^2.0.0

  # Push
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Utilities
  shared_preferences: ^2.5.3
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
